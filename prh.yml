version: 1

# textlint-rule-preset-ja-aifirst の prh 辞書
#
# 設計方針:
#   1. prh は文脈解析できない (純粋な regex 置換)。固有名詞と一般単語を区別できないため、
#      誤表記パターン (大文字小文字違い・空白挿入・ハイフン違い) のみを `patterns` に書き、
#      正しい表記 (`expected` と一致するもの) はマッチさせない。
#   2. preset-jtf-style と重複しない: 「全角と半角の間スペース」「カタカナ語の長音」等は
#      jtf-style 任せ。本辞書は固有名詞・専門用語の表記統一に集中する。
#   3. 各ルールに最低 1 件の specs テストケースを付ける (specs 失敗で本ファイル全体が
#      load 不可になる仕様)。
#   4. word boundary `(?<![-\w])` / `(?![-\w])` で URL やハイフン語との誤マッチを回避
#      (Node.js 18+ で動作)。

rules:

  # === Programming languages (legacy, kept for backward compat) ===

  - expected: ECMAScript $1
    patterns:
      - /ECMAScript([0-9]+)/i
      - /ECMA Script([0-9]+)/i
    specs:
      - from: ECMASCRIPT5
        to: ECMAScript 5

  - expected: JavaScript
    patterns:
      - /javascript/i
      - /Java Script/i
    specs:
      - from: javascript
        to: JavaScript
      - from: java script
        to: JavaScript
      - from: Java script
        to: JavaScript

  - expected: jQuery
    patterns:
      - /(?<![-\w])jquery(?![-\w])/i
    specs:
      - from: Jquery
        to: jQuery
      - from: jquery
        to: jQuery
      - from: jquery-ui
        to: jquery-ui

  # === Japanese style ===

  - expected: かもしれない
    patterns:
      - かも知れない
    specs:
      - from: かも知れない
        to: かもしれない

  # === AI Models ===

  - expected: ChatGPT
    patterns:
      - /Chat GPT/
      - /(?<![-\w])(chatgpt|Chatgpt|chat-gpt|CHATGPT)(?![-\w])/
    specs:
      - from: chatgpt
        to: ChatGPT
      - from: Chat GPT
        to: ChatGPT
      - from: chat-gpt
        to: ChatGPT

  - expected: GPT-4
